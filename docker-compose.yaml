services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ecommerce

  ecommerce:
    build: .
    container_name: ecommerce
    expose:
      - "5000"
    environment:
      BANK_PUBLIC_BASE: http://13.218.183.154
      MERCHANT_ACCOUNT: cloudchasers
