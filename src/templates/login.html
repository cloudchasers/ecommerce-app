{% extends 'base.html' %}

{% block content %}
<section class="login-container">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <h1>Welcome Back</h1>
        <p>Log in to your Sweetcrumb account</p>

        <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; font-size: 1rem;">Log In</button>
        </form>

        <div class="login-hint">
            <p>Demo accounts:</p>
            <code>john / john123</code> &nbsp;•&nbsp; <code>jane / jane123</code>
        </div>
    </div>
</section>
{% endblock %}
